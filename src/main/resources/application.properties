spring.application.name=mcp-database-client
server.port=8081

# Connect to the remote MCP Server via SSE
spring.ai.mcp.client.name=sqlite-client
spring.ai.mcp.client.type=sse
spring.ai.mcp.client.sse.url=http://localhost:8080/mcp/sse

# Disable OpenAI by default if no key is provided, or allow the user to use it.
# To use OpenAI, set SPRING_AI_OPENAI_API_KEY environment variable.
